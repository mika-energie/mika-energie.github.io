<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Mika</title>
<meta name="description" content="Contacter Mika, auteur indépendant sur l'énergie, l'écologie et le recyclage.">
<link rel="canonical" href="https://mika-energie.github.io/contact/">
<link rel="icon" href="/assets/favicon-32.png" sizes="32x32">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="site"><div class="wrap">
  <img src="/assets/avatar-512.png" alt="Mika" width="64" height="64">
  <div><div class="name">Mika</div>
  <div class="tag">Énergie, écologie, recyclage : les chiffres avant les slogans.</div></div>
</div></header>
<nav class="top"><div class="wrap">
  <a href="/">Accueil</a><a href="/a-propos/">À propos</a><a href="/contact/">Contact</a>
</div></nav>

<main><div class="wrap">
  <h1>Me contacter</h1>
  <p>Vous avez une question, ou un chiffre à me mettre sous le nez ? Écrivez-moi par ce formulaire. Aucune adresse n'apparaît ; le message passe par un relais.</p>

  <!-- Formulaire via service statique (Formspree / Web3Forms). Remplacer {{FORM_ENDPOINT}}
       par l'endpoint réel à la configuration. Le relais masque l'adresse de réception :
       l'e-mail privé n'apparaît JAMAIS dans cette page (R4). -->
  <form action="{{FORM_ENDPOINT}}" method="POST" style="font-family:system-ui,Arial,sans-serif;max-width:480px">
    <p><label>Votre nom<br><input type="text" name="name" required style="width:100%;padding:8px"></label></p>
    <p><label>Votre e-mail (pour la réponse)<br><input type="email" name="email" required style="width:100%;padding:8px"></label></p>
    <p><label>Message<br><textarea name="message" rows="6" required style="width:100%;padding:8px"></textarea></label></p>
    <p><button type="submit" style="background:#1F6B45;color:#fff;border:0;border-radius:6px;padding:10px 18px;cursor:pointer">Envoyer</button></p>
  </form>
</div></main>

<footer class="site"><div class="wrap">
  <p>Mika — auteur indépendant.</p>
</div></footer>
</body>
</html>
